services:
    upload-server:
        build: .
        user: "${PUID:-1000}:${PGID:-1000}"
        ports:
            - "${PORT:-9090}:8000"
        volumes:
            - ${DATA_DIR:-./data}:/data
            - ${CONFIG_DIR:-./config}:/config
        environment:
            - PORT=8000
            - STATIC_DIR=/data
            - CONFIG_DIR=/config
            - ENABLE_UPLOAD_FORM=${ENABLE_UPLOAD_FORM:-true}
            - JWT_SECRET=${JWT_SECRET:-}
        restart: unless-stopped
        container_name: static-upload-server
        
